name: Build Standalone Extension APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Extension APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build tachiyomix dependency from source
        run: |
          git clone https://github.com/VuGiaBao1337/moetruyen-mihon.git ../tachiyomix
          cd ../tachiyomix
          chmod +x gradlew
          ./gradlew publishToMavenLocal --no-daemon
          cd ../moetruyen-mihon-apk

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Build APK with Gradle
        run: ./gradlew assembleDebug --no-daemon

      - name: Archive Extension APK Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: MoeTruyen-Mihon-Extension-APK
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
